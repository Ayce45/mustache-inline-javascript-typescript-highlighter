name: Build & Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npx @vscode/vsce package

      - uses: actions/upload-artifact@v4
        with:
          name: mustache-inline-highlighter-vsix
          path: "*.vsix"

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          git show HEAD~1:package.json > /tmp/old-package.json 2>/dev/null || echo '{"version":"0.0.0"}' > /tmp/old-package.json
          PREVIOUS=$(node -p "require('/tmp/old-package.json').version")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifact
        if: steps.version.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: mustache-inline-highlighter-vsix

      - name: Create tag and release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.current }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" *.vsix --generate-notes --title "$VERSION"
